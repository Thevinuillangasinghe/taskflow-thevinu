name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Lint web
        run: |
          cd apps/web
          npm run lint

      - name: Run API tests
        run: |
          cd apps/api
          npm test

      - name: Build API
        run: |
          cd apps/api
          npm run build

      - name: Build web
        run: |
          cd apps/web
          npm run build