name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        run: |
          cd apps/web
          npm install

      - name: Install API dependencies
        run: |
          cd apps/api
          npm install

      - name: Lint web
        run: |
          cd apps/web
          npm run lint

      - name: Run API tests
        run: |
          cd apps/api
          npm test

      - name: Build API
        run: |
          cd apps/api
          npm run build

      - name: Build web
        run: |
          cd apps/web
          npm run build